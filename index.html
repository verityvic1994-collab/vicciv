<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的英文單字查詢字典 (發音升級版)</title>
    <style>
        /* 基礎網頁樣式美化 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: block;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 搜尋區域樣式 */
        .search-box {
            display: table;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-cell {
            display: table-cell;
            width: 100%;
            padding-right: 10px;
        }

        .btn-cell {
            display: table-cell;
            white-space: nowrap;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: #3182ce;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        /* 發音喇叭按鈕樣式 */
        .speak-btn {
            background-color: #edf2f7;
            color: #4a5568;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 6px;
            margin-left: 10px;
            display: inline-block;
            vertical-align: middle;
        }
        
        .speak-btn:hover {
            background-color: #e2e8f0;
        }

        /* 結果顯示區域樣式 */
        .result-container {
            border-top: 2px solid #edf2f7;
            padding-top: 20px;
            display: none; /* 預設隱藏 */
        }

        .word-header {
            margin-bottom: 15px;
        }

        .word-title {
            font-size: 28px;
            font-weight: bold;
            color: #2d3748;
            margin: 0;
            display: inline-block;
            vertical-align: middle;
        }

        .phonetic {
            font-size: 16px;
            color: #718096;
            margin-left: 12px;
            font-family: "Lucida Sans Unicode", sans-serif;
            display: inline-block;
            vertical-align: middle;
        }

        .meaning-block {
            background-color: #f7fafc;
            border-left: 4px solid #3182ce;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
        }

        .part-of-speech {
            font-style: italic;
            font-weight: bold;
            color: #4a5568;
            text-transform: capitalize;
            margin-bottom: 5px;
        }

        .definition-zh {
            font-size: 16px;
            font-weight: bold;
            color: #2b6cb0;
            margin: 0 0 6px 0;
        }

        .definition-en {
            font-size: 14px;
            line-height: 1.5;
            color: #4a5568;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 英語數位字典 (含發音)</h1>
        
        <div class="search-box">
            <div class="input-cell">
                <input type="text" id="wordInput" placeholder="請輸入英文單字 (例如: voice)..." autocomplete="off">
            </div>
            <div class="btn-cell">
                <button id="searchBtn">查詢</button>
            </div>
        </div>

        <div id="resultContainer" class="result-container">
            <div class="word-header">
                <h2 id="resultWord" class="word-title"></h2>
                <button id="speakBtn" class="speak-btn">🔊 發音</button>
                <span id="resultPhonetic" class="phonetic"></span>
            </div>
            <div id="definitions"></div>
        </div>
    </div>

    <script>
        let currentWord = ""; // 用來記錄當前查詢的單字

        document.getElementById('searchBtn').addEventListener('click', performSearch);

        document.getElementById('wordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // 🔊 點擊發音按鈕時觸發
        document.getElementById('speakBtn').addEventListener('click', function() {
            if (currentWord !== "") {
                // 建立語音播放物件
                const utterance = new SpeechSynthesisUtterance(currentWord);
                utterance.lang = 'en-US'; // 設定為美式英語發音
                window.speechSynthesis.speak(utterance); // 讓瀏覽器發出聲音
            }
        });

        function performSearch() {
            const wordInput = document.getElementById('wordInput');
            const word = wordInput.value.trim();
            
            if (word === "") {
                alert("請先輸入單字！");
                return;
            }

            // 記錄當前單字供發音使用
            currentWord = word;

            const apiUrl = `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("找不到這個單字，請檢查拼字是否正確！");
                    }
                    return response.json();
                })
                .then(async data => {
                    const wordData = data[0];
                    
                    document.getElementById('resultWord').innerText = wordData.word;
                    document.getElementById('resultPhonetic').innerText = wordData.phonetic || "暫無音標";
                    
                    const meaningsContainer = document.getElementById('definitions');
                    meaningsContainer.innerHTML = "正在翻譯中文解釋...";
                    document.getElementById('resultContainer').style.display = "block";
                    
                    const fragment = document.createDocumentFragment();

                    for (const meaning of wordData.meanings) {
                        const partOfSpeech = meaning.partOfSpeech;
                        const definitionEn = meaning.definitions[0].definition;
                        
                        let definitionZh = "暫無中文翻譯";
                        try {
                            const translateUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(definitionEn)}&langpair=en|zh-TW`;
                            const transRes = await fetch(translateUrl);
                            const transData = await transRes.json();
                            if (transData.responseData && transData.responseData.translatedText) {
                                definitionZh = transData.responseData.translatedText;
                            }
                        } catch (err) {
                            console.error("翻譯出錯:", err);
                        }
                        
                        const block = document.createElement('div');
                        block.className = 'meaning-block';
                        block.innerHTML = `
                            <div class="part-of-speech">[${partOfSpeech}]</div>
                            <p class="definition-zh">${definitionZh}</p>
                            <p class="definition-en">${definitionEn}</p>
                        `;
                        fragment.appendChild(block);
                    }
                    
                    meaningsContainer.innerHTML = "";
                    meaningsContainer.appendChild(fragment);
                })
                .catch(error => {
                    alert(error.message);
                    document.getElementById('resultContainer').style.display = "none";
                    currentWord = "";
                });
        }
    </script>

</body>
</html>
