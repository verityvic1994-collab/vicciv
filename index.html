<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的英文單字查詢字典 (中英雙語版)</title>
    <style>
        /* 基礎網頁樣式美化 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: block;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 搜尋區域樣式 */
        .search-box {
            display: table;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-cell {
            display: table-cell;
            width: 100%;
            padding-right: 10px;
        }

        .btn-cell {
            display: table-cell;
            white-space: nowrap;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: #3182ce;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        /* 結果顯示區域樣式 */
        .result-container {
            border-top: 2px solid #edf2f7;
            padding-top: 20px;
            display: none; /* 預設隱藏 */
        }

        .word-header {
            margin-bottom: 15px;
        }

        .word-title {
            font-size: 28px;
            font-weight: bold;
            color: #2d3748;
            margin: 0;
            display: inline-block;
        }

        .phonetic {
            font-size: 16px;
            color: #718096;
            margin-left: 12px;
            font-family: "Lucida Sans Unicode", sans-serif;
            display: inline-block;
        }

        .meaning-block {
            background-color: #f7fafc;
            border-left: 4px solid #3182ce;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
        }

        .part-of-speech {
            font-style: italic;
            font-weight: bold;
            color: #4a5568;
            text-transform: capitalize;
            margin-bottom: 5px;
        }

        .definition-zh {
            font-size: 16px;
            font-weight: bold;
            color: #2b6cb0; /* 中文用藍色加粗，更明顯 */
            margin: 0 0 6px 0;
        }

        .definition-en {
            font-size: 14px;
            line-height: 1.5;
            color: #4a5568;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 中英雙語單字字典</h1>
        
        <div class="search-box">
            <div class="input-cell">
                <input type="text" id="wordInput" placeholder="請輸入英文單字 (例如: friend)..." autocomplete="off">
            </div>
            <div class="btn-cell">
                <button id="searchBtn">查詢</button>
            </div>
        </div>

        <div id="resultContainer" class="result-container">
            <div class="word-header">
                <h2 id="resultWord" class="word-title"></h2>
                <span id="resultPhonetic" class="phonetic"></span>
            </div>
            <div id="definitions"></div>
        </div>
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', performSearch);

        document.getElementById('wordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // 核心查詢函式
        function performSearch() {
            const wordInput = document.getElementById('wordInput');
            const word = wordInput.value.trim();
            
            if (word === "") {
                alert("請先輸入單字！");
                return;
            }

            // 1. 先抓取英英字典 API
            const apiUrl = `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("找不到這個單字，請檢查拼字是否正確！");
                    }
                    return response.json();
                })
                .then(async data => {
                    const wordData = data[0];
                    
                    document.getElementById('resultWord').innerText = wordData.word;
                    document.getElementById('resultPhonetic').innerText = wordData.phonetic || "暫無音標";
                    
                    const meaningsContainer = document.getElementById('definitions');
                    meaningsContainer.innerHTML = "正在翻譯中文解釋..."; // 讀取中的提示
                    document.getElementById('resultContainer').style.display = "block";
                    
                    // 用來收集所有動態建立的 HTML 區塊
                    const fragment = document.createDocumentFragment();

                    // 2. 跑迴圈處理每個詞性，並即時翻譯
                    for (const meaning of wordData.meanings) {
                        const partOfSpeech = meaning.partOfSpeech;
                        const definitionEn = meaning.definitions[0].definition;
                        
                        // 呼叫免費翻譯 API (將英文翻譯為繁體中文)
                        let definitionZh = "暫無中文翻譯";
                        try {
                            const translateUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(definitionEn)}&langpair=en|zh-TW`;
                            const transRes = await fetch(translateUrl);
                            const transData = await transRes.json();
                            if (transData.responseData && transData.responseData.translatedText) {
                                definitionZh = transData.responseData.translatedText;
                            }
                        } catch (err) {
                            console.error("翻譯出錯:", err);
                        }
                        
                        // 建立顯示區塊
                        const block = document.createElement('div');
                        block.className = 'meaning-block';
                        block.innerHTML = `
                            <div class="part-of-speech">[${partOfSpeech}]</div>
                            <p class="definition-zh">${definitionZh}</p>
                            <p class="definition-en">${definitionEn}</p>
                        `;
                        fragment.appendChild(block);
                    }
                    
                    // 翻譯全部完成後，一次塞入網頁中
                    meaningsContainer.innerHTML = "";
                    meaningsContainer.appendChild(fragment);
                })
                .catch(error => {
                    alert(error.message);
                    document.getElementById('resultContainer').style.display = "none";
                });
        }
    </script>

</body>
</html>
